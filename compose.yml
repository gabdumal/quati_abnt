version: "3.8"

services:
  dev_environment:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
      args:
        - QUATI_ABNT_VERSION=0.0.1
    user: root
    volumes:
      # Mount the project root
      - .:/workspace:Z
      # Named volumes for Cargo cache (avoids recompiling dependencies on rebuild)
      - cargo_registry:/root/.cargo/registry
      - cargo_git:/root/.cargo/git
      - cargo_target:/workspace/target
    working_dir: /workspace
    # Keep container running
    command: sleep infinity

volumes:
  cargo_registry:
    name: cargo_registry
  cargo_git:
    name: cargo_git
  cargo_target:
